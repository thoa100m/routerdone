services:
  routerdone:
    build:
      context: .
      dockerfile: Dockerfile
    image: routerdone:local
    container_name: routerdone
    restart: unless-stopped
    ports:
      - "${PORT:-20128}:20128"
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:?set INITIAL_PASSWORD}
      API_KEY_SECRET: ${API_KEY_SECRET:?set API_KEY_SECRET}
      MACHINE_ID_SALT: ${MACHINE_ID_SALT:?set MACHINE_ID_SALT}
      PORT: 20128
      HOSTNAME: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}
      DATA_DIR: /app/data
      NEXT_TELEMETRY_DISABLED: 1
      BASE_URL: ${BASE_URL:-http://localhost:20128}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
      CLOUD_URL: ${CLOUD_URL:-}
      NEXT_PUBLIC_CLOUD_URL: ${NEXT_PUBLIC_CLOUD_URL:-}
      TUNNEL_WORKER_URL: ${TUNNEL_WORKER_URL:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}
      ENABLE_REQUEST_LOGS: ${ENABLE_REQUEST_LOGS:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
    volumes:
      - routerdone-data:/app/data
      - routerdone-data-home:/app/data-home
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:20128/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  routerdone-data:
  routerdone-data-home:
